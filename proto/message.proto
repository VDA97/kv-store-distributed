syntax = "proto3";

package kv_store.network;

message KVRequest {
    enum CommandType {
        GET = 0;
        SET = 1;
        DELETE = 2;
    }

    CommandType type = 1;
    string key = 2;
    string value = 3;
    int64 ttl_seconds = 4;
}

message KVResponse {
    bool success = 1;
    string message = 2;
    string value = 3;
}